<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiv's SF Eats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --border: #e8e4de;
  --text: #1a1814;
  --muted: #8a8480;
  --accent: #7c5cbf;
  --accent2: #9b87cc;
  --accent-light: #f0edf9;
  --tag-bg: #f0ede8;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:1000; }
.logo { font-family:'DM Serif Display',serif; font-size:1.25rem; letter-spacing:-0.01em; color:var(--text); }
.logo em { color:var(--accent); font-style:italic; }
.header-right { display:flex; align-items:center; gap:12px; }
.count-badge { font-size:0.75rem; font-weight:500; color:var(--muted); background:var(--tag-bg); padding:3px 9px; border-radius:20px; }
.legend-bar { display:flex; align-items:center; gap:7px; font-size:0.7rem; color:var(--muted); }
.legend-bar span { display:flex; align-items:center; gap:3px; white-space:nowrap; }
.leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; display:inline-block; }

.controls-bar { display:flex; align-items:center; gap:8px; padding:8px 20px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
.controls-bar::-webkit-scrollbar { display:none; }
.search-wrap { position:relative; flex-shrink:0; }
.search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.search-wrap input { padding:6px 10px 6px 29px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.82rem; width:190px; background:var(--bg); outline:none; transition:border-color .15s; color:var(--text); }
.search-wrap input:focus { border-color:var(--accent); }
.filter-scroll { display:flex; gap:5px; overflow-x:auto; flex:1; }
.filter-scroll::-webkit-scrollbar { display:none; }
.filter-chip { white-space:nowrap; padding:4px 11px; border:1px solid var(--border); border-radius:20px; font-family:inherit; font-size:0.77rem; cursor:pointer; background:var(--bg); color:var(--muted); transition:all .15s; flex-shrink:0; }
.filter-chip:hover { border-color:var(--accent); color:var(--accent); }
.filter-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.sort-select { padding:5px 9px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.77rem; background:var(--bg); color:var(--text); cursor:pointer; outline:none; flex-shrink:0; }
.add-btn { display:flex; align-items:center; gap:5px; padding:5px 12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:inherit; font-size:0.8rem; font-weight:500; cursor:pointer; flex-shrink:0; transition:opacity .15s; white-space:nowrap; }
.add-btn:hover { opacity:0.88; }

.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:340px; flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg); overflow:hidden; }
.list-container { flex:1; overflow-y:auto; padding:6px; }
.list-container::-webkit-scrollbar { width:3px; }
.list-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.restaurant-card { padding:11px 13px; border-radius:9px; cursor:pointer; border:1px solid transparent; transition:all .15s; background:var(--surface); margin-bottom:4px; }
.restaurant-card:hover { border-color:var(--border); box-shadow:var(--shadow); }
.restaurant-card.active { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; margin-bottom:3px; }
.card-name { font-weight:500; font-size:0.87rem; line-height:1.3; color:var(--text); }
.card-rating { font-family:'DM Serif Display',serif; font-size:0.98rem; color:var(--accent); white-space:nowrap; flex-shrink:0; }
.card-meta { font-size:0.74rem; color:var(--muted); display:flex; gap:6px; flex-wrap:wrap; margin-bottom:4px; }
.card-review { font-size:0.75rem; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.no-results { text-align:center; padding:50px 20px; color:var(--muted); font-size:0.85rem; }
#map { flex:1; z-index:1; }

.marker-pin { width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.25); border:2px solid rgba(255,255,255,0.9); }
.marker-pin span { transform:rotate(45deg); font-size:0.58rem; font-weight:700; color:white; font-family:'DM Sans',sans-serif; text-shadow:0 1px 2px rgba(0,0,0,0.3); }

.leaflet-popup-content-wrapper { border-radius:12px !important; box-shadow:var(--shadow-lg) !important; padding:0 !important; overflow:hidden; border:1px solid var(--border); font-family:'DM Sans',sans-serif !important; min-width:270px; max-width:310px; }
.leaflet-popup-content { margin:0 !important; width:auto !important; }
.leaflet-popup-tip-container { display:none; }
.leaflet-popup-close-button { top:9px !important; right:9px !important; color:var(--muted) !important; font-size:17px !important; z-index:10; }
.popup-inner { padding:16px 16px 14px; }
.popup-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; }
.popup-name { font-family:'DM Serif Display',serif; font-size:1rem; line-height:1.3; color:var(--text); }
.popup-rating { font-family:'DM Serif Display',serif; font-size:1.25rem; color:var(--accent); white-space:nowrap; flex-shrink:0; }
.popup-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:9px; }
.popup-tag { font-size:0.7rem; padding:2px 7px; border-radius:20px; background:var(--tag-bg); color:var(--muted); }
.popup-tag.cuisine { background:var(--accent-light); color:var(--accent); }
.popup-review { font-size:0.8rem; color:#4a4744; line-height:1.6; border-top:1px solid var(--border); padding-top:9px; max-height:130px; overflow-y:auto; }
.popup-review::-webkit-scrollbar { width:3px; }
.popup-review::-webkit-scrollbar-thumb { background:var(--border); }
.popup-edit-btn { margin-top:10px; padding:5px 12px; background:var(--tag-bg); border:1px solid var(--border); border-radius:6px; font-family:inherit; font-size:0.75rem; cursor:pointer; color:var(--muted); width:100%; transition:all .15s; }
.popup-edit-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:16px; padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); position:relative; }
.modal h2 { font-family:'DM Serif Display',serif; font-size:1.3rem; margin-bottom:18px; color:var(--text); }
.modal-close { position:absolute; top:14px; right:16px; background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--muted); line-height:1; }
.form-row { margin-bottom:14px; }
.form-row label { display:block; font-size:0.75rem; font-weight:500; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.04em; }
.form-row input, .form-row select, .form-row textarea { width:100%; padding:8px 11px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.85rem; background:var(--bg); outline:none; transition:border-color .15s; color:var(--text); }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--accent); }
.form-row textarea { resize:vertical; min-height:80px; }
.form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.map-pick-area { border:1px solid var(--border); border-radius:8px; overflow:hidden; height:210px; margin-bottom:5px; }
#pickMap { height:100%; width:100%; }
.map-pick-hint { font-size:0.74rem; color:var(--muted); margin-bottom:14px; }
.coord-display { font-size:0.73rem; color:var(--accent); font-weight:500; margin-top:3px; }
.btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; align-items:center; }
.btn-cancel { padding:8px 18px; background:var(--tag-bg); border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.85rem; cursor:pointer; color:var(--muted); }
.btn-cancel:hover { border-color:var(--muted); }
.btn-save { padding:8px 20px; background:var(--accent); border:none; border-radius:8px; font-family:inherit; font-size:0.85rem; font-weight:500; cursor:pointer; color:#fff; }
.btn-save:hover { opacity:0.88; }
.btn-delete { padding:8px 14px; background:var(--accent-light); border:1px solid #c9b8e8; border-radius:8px; font-family:inherit; font-size:0.85rem; cursor:pointer; color:var(--accent); margin-right:auto; }
.btn-delete:hover { background:#e4daf5; }

/* ── Mobile ─────────────────────────────────────────────────── */
.mob-list-btn { display:none; }
.bottom-sheet { display:none; }
.sheet-backdrop { display:none; }

@media (max-width:700px) {
  header { height:48px; padding:0 14px; }
  .logo { font-size:1.1rem; }
  .legend-bar { display:none; }

  .controls-bar { padding:7px 12px; gap:6px; }
  .search-wrap input { width:150px; font-size:0.78rem; }
  .filter-scroll { display:none; }
  .sort-select { display:none; }
  .add-btn { padding:6px 10px; border-radius:8px; font-size:0.75rem; }

  .main { position:relative; }
  .sidebar { display:none; }
  #map { width:100%; height:100%; }

  .mob-list-btn {
    display:flex !important;
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    z-index:1100; background:var(--accent); color:#fff;
    border:none; border-radius:24px; padding:11px 24px;
    font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500;
    box-shadow:0 4px 20px rgba(0,0,0,0.25); cursor:pointer;
    align-items:center; gap:7px; white-space:nowrap;
  }

  .sheet-backdrop {
    display:block !important; position:fixed; inset:0; z-index:1190;
    background:rgba(0,0,0,0.3); opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  .sheet-backdrop.open { opacity:1; pointer-events:all; }

  .bottom-sheet {
    display:flex !important; flex-direction:column;
    position:fixed; bottom:0; left:0; right:0; z-index:1200;
    background:var(--surface); border-radius:20px 20px 0 0;
    box-shadow:0 -4px 30px rgba(0,0,0,0.15);
    transform:translateY(100%); transition:transform 0.3s cubic-bezier(.4,0,.2,1);
    max-height:78vh;
  }
  .bottom-sheet.open { transform:translateY(0); }

  .sheet-handle-row {
    display:flex; justify-content:center; padding:10px 16px 4px; flex-shrink:0;
  }
  .sheet-handle { width:36px; height:4px; background:var(--border); border-radius:4px; }

  .sheet-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 16px 10px; border-bottom:1px solid var(--border);
    flex-shrink:0; gap:8px;
  }
  .sheet-title { font-family:'DM Serif Display',serif; font-size:0.95rem; }
  .sheet-meta { display:flex; align-items:center; gap:8px; }
  .sheet-count { font-size:0.73rem; color:var(--muted); }
  .sheet-close-btn {
    background:none; border:none; font-size:1.3rem; cursor:pointer;
    color:var(--muted); line-height:1; padding:0 2px;
  }
  .sheet-sort { padding:5px 8px; border:1px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:0.75rem; background:var(--bg); color:var(--text);
    cursor:pointer; outline:none;
  }
  .sheet-filters-row {
    display:flex; gap:5px; overflow-x:auto; padding:8px 12px;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .sheet-filters-row::-webkit-scrollbar { display:none; }
  .sheet-list { flex:1; overflow-y:auto; padding:6px; -webkit-overflow-scrolling:touch; }
  .sheet-list::-webkit-scrollbar { width:3px; }
  .sheet-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Shiv's <em>SF Eats</em></div>
  <div class="header-right">
    <div class="legend-bar">
      <span><i class="leg-dot" style="background:#d93b2b"></i>≤5</span>
      <span><i class="leg-dot" style="background:#f59500"></i>5.5</span>
      <span><i class="leg-dot" style="background:#f5c000"></i>6</span>
      <span><i class="leg-dot" style="background:#b8d930"></i>7</span>
      <span><i class="leg-dot" style="background:#52bb5c"></i>8</span>
      <span><i class="leg-dot" style="background:#1e7e3e"></i>9+</span>
    </div>
    <span class="count-badge" id="visibleCount">— spots</span>
  </div>
</header>

<div class="controls-bar">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search…">
  </div>
  <div class="filter-scroll" id="cuisineFilters">
    <button class="filter-chip active" data-cuisine="all">All</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="rating">Top Rated</option>
    <option value="name">A → Z</option>
    <option value="cost">Price ↑</option>
  </select>
  <button class="add-btn" id="openAddBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Restaurant
  </button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="list-container" id="listContainer"></div>
  </div>
  <div id="map"></div>
</div>

<!-- Mobile bottom sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<button class="mob-list-btn" id="mobListBtn">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
  Browse List
</button>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
  <div class="sheet-header">
    <span class="sheet-title">Restaurants</span>
    <div class="sheet-meta">
      <span class="sheet-count" id="sheetCount"></span>
      <select class="sheet-sort" id="sheetSort">
        <option value="rating">Top Rated</option>
        <option value="name">A → Z</option>
        <option value="cost">Price ↑</option>
      </select>
      <button class="sheet-close-btn" id="sheetClose">×</button>
    </div>
  </div>
  <div class="sheet-filters-row" id="sheetFilters">
    <button class="filter-chip active" data-cuisine="all">All</button>
  </div>
  <div class="sheet-list" id="sheetList"></div>
</div>


<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">×</button>
    <h2 id="modalTitle">Add Restaurant</h2>
    <div class="form-row">
      <label>Restaurant Name *</label>
      <input type="text" id="fName" placeholder="e.g. Tartine Bakery">
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Rating (out of 10)</label>
        <input type="text" id="fRating" placeholder="e.g. 8.5">
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Cuisine Type</label>
        <input type="text" id="fCuisine" placeholder="e.g. Italian">
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Neighborhood</label>
        <input type="text" id="fHood" placeholder="e.g. Mission">
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>City</label>
        <input type="text" id="fCity" placeholder="e.g. SF">
      </div>
    </div>
    <div class="form-row">
      <label>Price Range</label>
      <select id="fCost">
        <option value="$">$ — Cheap eats</option>
        <option value="$$" selected>$$ — Mid range</option>
        <option value="$$$">$$$ — Pricey</option>
        <option value="$$$$">$$$$ — Splurge</option>
      </select>
    </div>
    <div class="form-row">
      <label>Review / Notes</label>
      <textarea id="fReview" placeholder="What did you think? What to order?"></textarea>
    </div>
    <div class="form-row">
      <label>Pin Location — click map to place</label>
      <div class="map-pick-area"><div id="pickMap"></div></div>
      <div class="map-pick-hint">Click anywhere on the map to drop the pin, or drag it to adjust.</div>
      <div class="coord-display" id="coordDisplay">No location set yet — click the map above</div>
    </div>
    <div class="btn-row">
      <button class="btn-delete" id="btnDelete" style="display:none">Delete</button>
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-save" id="btnSave">Save</button>
    </div>
  </div>
</div>

<script>
function getRatingColor(r) {
  // Smooth gradient: red (≤4) → orange (5s) → yellow (6s) → yellow-green (7s) → green (8s+)
  if (r >= 9.0) return '#1e7e3e';   // deep green
  if (r >= 8.5) return '#2ea84f';   // green
  if (r >= 8.0) return '#52bb5c';   // light green
  if (r >= 7.5) return '#8ecf47';   // yellow-green
  if (r >= 7.0) return '#b8d930';   // lime
  if (r >= 6.5) return '#e0d816';   // yellow
  if (r >= 6.0) return '#f5c000';   // amber-yellow
  if (r >= 5.5) return '#f59500';   // orange
  if (r >= 5.0) return '#f06b00';   // deep orange
  return '#d93b2b';                  // red
}

const STORE_KEY = 'shivsEats_v4';
function loadData() {
  try { const r = localStorage.getItem(STORE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return null;
}
function saveData(arr) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); } catch(e) {}
}

function buildFromSeed() {
  const jitter = () => (Math.random() - 0.5) * 0.0045;
  return SEED.map((r, i) => {
    const rating = parseFloat(r[1]) || 0;
    const c = getCoords(r[3], r[4]);
    return { id:'seed_'+i, name:r[0], rating, cuisine:r[2], neighborhood:r[3],
      city:r[4], cost:r[5], review:r[6],
      coords: c ? [c[0]+jitter(), c[1]+jitter()] : null, custom:false };
  });
}

let restaurants = loadData();
if (!restaurants || restaurants.length < SEED.length) {
  restaurants = buildFromSeed();
  saveData(restaurants);
}

// Map
const map = L.map('map', {zoomControl:true}).setView([37.7749,-122.4194], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19 }).addTo(map);

let activeCuisine = 'all', searchQuery = '', sortBy = 'rating', activeId = null;
const markerMap = {};

function rebuildCuisineFilters() {
  const cuisines = [...new Set(restaurants.map(r=>r.cuisine).filter(Boolean))].sort();
  const cont = document.getElementById('cuisineFilters');
  cont.innerHTML = '<button class="filter-chip active" data-cuisine="all">All</button>';
  cuisines.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (activeCuisine===c?' active':'');
    btn.dataset.cuisine = c; btn.textContent = c;
    cont.appendChild(btn);
  });
}

function filterSort() {
  return restaurants.filter(r => {
    const mc = activeCuisine==='all' || r.cuisine===activeCuisine;
    const q = searchQuery.toLowerCase();
    const ms = !q || r.name.toLowerCase().includes(q) ||
      (r.cuisine||'').toLowerCase().includes(q) ||
      (r.neighborhood||'').toLowerCase().includes(q) ||
      (r.review||'').toLowerCase().includes(q);
    return mc && ms;
  }).sort((a,b) => {
    if(sortBy==='rating') return b.rating-a.rating;
    if(sortBy==='name') return a.name.localeCompare(b.name);
    if(sortBy==='cost') return (a.cost||'').length-(b.cost||'').length;
    return 0;
  });
}

function buildPopupHTML(r) {
  const review = r.review ? `<div class="popup-review">${r.review}</div>` : '';
  const esc = r.id.replace(/'/g,"\\'");
  return `<div class="popup-inner">
    <div class="popup-header">
      <div class="popup-name">${r.name}</div>
      <div class="popup-rating">${r.rating ? r.rating+'/10' : '—'}</div>
    </div>
    <div class="popup-tags">
      <span class="popup-tag cuisine">${r.cuisine||'—'}</span>
      <span class="popup-tag">${r.neighborhood||''}${r.city&&r.city!==r.neighborhood?', '+r.city:''}</span>
      <span class="popup-tag">${r.cost||''}</span>
    </div>
    ${review}
    <button class="popup-edit-btn" onclick="openEdit('${esc}')">✏ Edit</button>
  </div>`;
}

function renderList() {
  const visible = filterSort();
  const container = document.getElementById('listContainer');
  container.innerHTML = '';
  visible.forEach(r => {
    const card = document.createElement('div');
    card.className = 'restaurant-card' + (r.id===activeId?' active':'');
    card.dataset.id = r.id;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${r.name}</div>
        <div class="card-rating">${r.rating ? r.rating+'/10' : '—'}</div>
      </div>
      <div class="card-meta">
        <span>${r.cuisine||'—'}</span><span>·</span>
        <span>${r.neighborhood||''}</span><span>·</span>
        <span>${r.cost||''}</span>
      </div>
      ${r.review?`<div class="card-review">${r.review}</div>`:''}
    `;
    card.addEventListener('click', ()=>selectRestaurant(r.id));
    container.appendChild(card);
  });
  document.getElementById('visibleCount').textContent = visible.length+' spots';
  const visIds = new Set(visible.map(r=>r.id));
  restaurants.forEach(r => {
    const m = markerMap[r.id];
    if(!m) return;
    if(visIds.has(r.id)) m.addTo(map); else m.remove();
  });
}

function selectRestaurant(id) {
  document.querySelector(`.restaurant-card[data-id="${activeId}"]`)?.classList.remove('active');
  activeId = id;
  document.querySelector(`.restaurant-card[data-id="${id}"]`)?.classList.add('active');
  document.querySelector(`.restaurant-card[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  const r = restaurants.find(x=>x.id===id);
  if(!r?.coords) return;
  map.flyTo(r.coords, 15, {duration:0.6});
  markerMap[id]?.openPopup();
}

function createMarker(r) {
  if(!r.coords) return;
  const color = getRatingColor(r.rating);
  const icon = L.divIcon({
    html:`<div class="marker-pin" style="background:${color}"><span>${r.rating||'?'}</span></div>`,
    iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-32], className:''
  });
  const m = L.marker(r.coords, {icon}).bindPopup(buildPopupHTML(r),{maxWidth:310,minWidth:270,closeButton:true});
  m.on('click', ()=>selectRestaurant(r.id));
  markerMap[r.id] = m;
  m.addTo(map);
}
function removeMarker(id) { if(markerMap[id]){markerMap[id].remove();delete markerMap[id];} }
function refreshMarker(r) { removeMarker(r.id); createMarker(r); }

restaurants.forEach(createMarker);

document.getElementById('search').addEventListener('input', e=>{searchQuery=e.target.value;renderList();});
document.getElementById('sortSelect').addEventListener('change', e=>{sortBy=e.target.value;renderList();});
document.getElementById('cuisineFilters').addEventListener('click', e=>{
  const chip = e.target.closest('.filter-chip');
  if(!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeCuisine = chip.dataset.cuisine;
  renderList();
});

// Modal
let pickMap=null, pickMarker=null, editingId=null;

function initPickMap() {
  if(pickMap) return;
  pickMap = L.map('pickMap',{zoomControl:true}).setView([37.7749,-122.4194],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(pickMap);
  pickMap.on('click', e=>{ setPickMarker(e.latlng.lat, e.latlng.lng); });
}

function setPickMarker(lat, lng) {
  if(pickMarker) pickMap.removeLayer(pickMarker);
  pickMarker = L.marker([lat,lng],{draggable:true}).addTo(pickMap);
  pickMarker.on('dragend', e=>{ const p=e.target.getLatLng(); updateCoordDisplay(p.lat,p.lng); });
  updateCoordDisplay(lat,lng);
}
function updateCoordDisplay(lat,lng) {
  document.getElementById('coordDisplay').textContent=`📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}
function getPickedCoords() {
  if(!pickMarker) return null;
  const p=pickMarker.getLatLng();
  return [p.lat,p.lng];
}

function openModal(title, prefill={}) {
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('fName').value=prefill.name||'';
  document.getElementById('fRating').value=prefill.rating||'';
  document.getElementById('fCuisine').value=prefill.cuisine||'';
  document.getElementById('fHood').value=prefill.neighborhood||'';
  document.getElementById('fCity').value=prefill.city||'';
  document.getElementById('fCost').value=prefill.cost||'$$';
  document.getElementById('fReview').value=prefill.review||'';
  document.getElementById('coordDisplay').textContent=prefill.coords
    ?`📍 ${prefill.coords[0].toFixed(5)}, ${prefill.coords[1].toFixed(5)}`
    :'No location set yet — click the map above';
  document.getElementById('btnDelete').style.display=editingId?'block':'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{
    initPickMap(); pickMap.invalidateSize();
    if(prefill.coords){
      setPickMarker(prefill.coords[0],prefill.coords[1]);
      pickMap.setView(prefill.coords,15);
    } else {
      if(pickMarker){pickMap.removeLayer(pickMarker);pickMarker=null;}
      pickMap.setView([37.7749,-122.4194],12);
    }
  },80);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId=null; }

document.getElementById('openAddBtn').addEventListener('click',()=>{editingId=null;openModal('Add Restaurant');});
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('btnCancel').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});

window.openEdit = function(id) {
  editingId=id;
  const r=restaurants.find(x=>x.id===id);
  if(!r) return;
  openModal('Edit Restaurant', r);
};

document.getElementById('btnSave').addEventListener('click',()=>{
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('Please enter a restaurant name.');return;}
  const rating=parseFloat(document.getElementById('fRating').value)||0;
  const coords=getPickedCoords();
  const data={name,rating,cuisine:document.getElementById('fCuisine').value.trim(),
    neighborhood:document.getElementById('fHood').value.trim(),
    city:document.getElementById('fCity').value.trim(),
    cost:document.getElementById('fCost').value,
    review:document.getElementById('fReview').value.trim(),coords,custom:true};
  if(editingId){
    const idx=restaurants.findIndex(r=>r.id===editingId);
    if(idx!==-1){restaurants[idx]={...restaurants[idx],...data};refreshMarker(restaurants[idx]);}
  } else {
    const newR={id:'custom_'+Date.now(),...data};
    restaurants.push(newR);createMarker(newR);
  }
  saveData(restaurants);rebuildCuisineFilters();renderList();closeModal();
  if(!editingId&&coords) map.flyTo(coords,15,{duration:0.8});
});

document.getElementById('btnDelete').addEventListener('click',()=>{
  if(!editingId||!confirm('Delete this restaurant?')) return;
  removeMarker(editingId);
  restaurants=restaurants.filter(r=>r.id!==editingId);
  saveData(restaurants);rebuildCuisineFilters();renderList();closeModal();
});

rebuildCuisineFilters();
renderList();

document.getElementById('sheetSort').addEventListener('change', e => {
  sortBy = e.target.value;
  document.getElementById('sortSelect').value = e.target.value;
  renderSheetList();
  renderList();
});

// Sheet cuisine filters (mirrors main filters)
function rebuildSheetFilters() {
  const cuisines = [...new Set(restaurants.map(r => r.cuisine).filter(Boolean))].sort();
  const cont = document.getElementById('sheetFilters');
  cont.innerHTML = '<button class="filter-chip active" data-cuisine="all">All</button>';
  cuisines.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (activeCuisine === c ? ' active' : '');
    btn.dataset.cuisine = c;
    btn.textContent = c;
    cont.appendChild(btn);
  });
}
document.getElementById('sheetFilters').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('#sheetFilters .filter-chip, #cuisineFilters .filter-chip').forEach(c => c.classList.remove('active'));
  // activate matching chips in both bars
  document.querySelectorAll(`[data-cuisine="${chip.dataset.cuisine}"]`).forEach(c => c.classList.add('active'));
  activeCuisine = chip.dataset.cuisine;
  renderSheetList();
  renderList();
});

function renderSheetList() {
  if (!isMobile()) return;
  const visible = filterSort();
  const container = document.getElementById('sheetList');
  container.innerHTML = '';
  document.getElementById('sheetCount').textContent = visible.length + ' spots';
  visible.forEach(r => {
    const card = document.createElement('div');
    card.className = 'restaurant-card' + (r.id === activeId ? ' active' : '');
    card.dataset.id = r.id;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${r.name}</div>
        <div class="card-rating">${r.rating ? r.rating + '/10' : '—'}</div>
      </div>
      <div class="card-meta">
        <span>${r.cuisine || '—'}</span><span>·</span>
        <span>${r.neighborhood || ''}</span><span>·</span>
        <span>${r.cost || ''}</span>
      </div>
      ${r.review ? `<div class="card-review">${r.review}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      closeSheet();
      selectRestaurant(r.id);
    });
    container.appendChild(card);
  });
}

// Re-render sheet when search changes on mobile
document.getElementById('search').addEventListener('input', () => {
  if (isMobile()) renderSheetList();
});

// On map pin tap on mobile, close the sheet
map.on('popupopen', () => {
  if (isMobile()) closeSheet();
});

// Patch rebuildCuisineFilters to also rebuild sheet filters
const _origRebuild = rebuildCuisineFilters;
// already called above — also call sheet rebuild after main renders
const _origRenderList = renderList;

rebuildSheetFilters();
</script>
